# Register Broker — CodeQL analysis
#
# C# (broker): analyzed on windows-latest via dotnet build.
#
# C/C++ (kernel driver): NOT analyzed here. The driver requires WDK
# (not on hosted runners) and is gated by hardware validation instead —
# same policy as the driver compile in ci.yml.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC

jobs:
  analyze-csharp:
    name: Analyze C#
    runs-on: windows-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          # security-extended (not security-and-quality): this is a low-level hardware framework —
          # the quality/style suite only produced by-design noise (P/Invoke, service-resilience
          # catches, best-effort logging) and zero security findings. security-extended keeps full
          # security coverage without the noise. See the CodeQL review note in the repo history.
          queries: security-extended

      - name: Build broker
        run: dotnet build BrokerSensorBridge/BrokerSensorBridge.csproj -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:csharp

  # Scan the GitHub Actions workflow files themselves (the `actions` language). This is what
  # catches things like missing GITHUB_TOKEN permissions. It needs no build — CodeQL reads the
  # YAML directly — so it runs on a cheap Linux runner. Without this, workflow-YAML alerts have
  # no analysis re-evaluating them (the C# job above only covers `csharp`).
  analyze-actions:
    name: Analyze Actions workflows
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:actions
