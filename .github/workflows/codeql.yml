# Register Broker — CodeQL analysis
#
# C# (broker): analyzed on windows-latest via dotnet build.
#
# C/C++ (kernel driver): NOT analyzed here. The driver requires WDK
# (not on hosted runners) and is gated by hardware validation instead —
# same policy as the driver compile in ci.yml.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC

jobs:
  analyze-csharp:
    name: Analyze C#
    runs-on: windows-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: Build broker
        run: dotnet build BrokerSensorBridge/BrokerSensorBridge.csproj -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:csharp
