<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0b1220" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="400" fill="url(#bgGrad)"/>
  <text x="500" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">The Pieces</text>

  <!-- client -->
  <g filter="url(#shadow)">
    <rect x="40" y="92" width="260" height="96" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="170" y="130" text-anchor="middle" font-size="16" font-weight="600" fill="#1e3a8a">non-admin client</text>
    <text x="170" y="156" text-anchor="middle" font-size="12.5" fill="#475569">your app / CLI</text>
    <text x="170" y="175" text-anchor="middle" font-size="11.5" fill="#64748b">sends logical ids only</text>
  </g>

  <!-- arrow client -> broker -->
  <line x1="300" y1="140" x2="556" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="428" y="124" text-anchor="middle" font-size="11.5" fill="#475569">named pipe (JSON)</text>
  <text x="428" y="160" text-anchor="middle" font-size="11.5" fill="#475569">sensors:read / rgb:write</text>

  <!-- broker -->
  <g filter="url(#shadow)">
    <rect x="560" y="70" width="400" height="140" rx="12" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
    <text x="760" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#115e59">BrokerSensorBridge</text>
    <text x="760" y="121" text-anchor="middle" font-size="11.5" fill="#64748b">LocalSystem service · the only driver handle</text>
    <line x1="588" y1="134" x2="932" y2="134" stroke="#a7f3d0" stroke-width="1"/>
    <text x="760" y="154" text-anchor="middle" font-size="12" fill="#334155">auth · scopes · policy</text>
    <text x="760" y="173" text-anchor="middle" font-size="12" fill="#334155">rate-limit · audit log</text>
    <text x="760" y="192" text-anchor="middle" font-size="12" fill="#334155">logical-id → hardware</text>
  </g>

  <!-- arrow broker -> driver -->
  <line x1="760" y1="210" x2="760" y2="256" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="772" y="238" font-size="11.5" fill="#475569">bounded IOCTLs</text>

  <!-- driver -->
  <g filter="url(#shadow)">
    <rect x="560" y="260" width="400" height="110" rx="12" fill="#fff1f2" stroke="#fb7185" stroke-width="1.5"/>
    <text x="760" y="292" text-anchor="middle" font-size="16" font-weight="600" fill="#9f1239">BrokerSmbus (KMDF)</text>
    <text x="760" y="316" text-anchor="middle" font-size="12" fill="#334155">named-register IOCTLs</text>
    <text x="760" y="336" text-anchor="middle" font-size="12" fill="#334155">in-kernel allow-list + brick-guards</text>
    <text x="760" y="356" text-anchor="middle" font-size="11" fill="#9f1239">no port I/O · no phys-mem · no MSR</text>
  </g>

  <text x="170" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Elevation never crosses</text>
  <text x="170" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">back to the client.</text>
</svg>
