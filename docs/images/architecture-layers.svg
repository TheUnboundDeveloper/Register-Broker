<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="648" viewBox="0 0 1000 648" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0b1220" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="648" fill="url(#bgGrad)"/>
  <text x="500" y="42" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">Register Broker — The Four Layers</text>
  <text x="500" y="66" text-anchor="middle" font-size="13.5" fill="#475569">One privilege boundary (the named pipe) separates untrusted consumers from the elevated stack</text>

  <!-- LAYER 4 -->
  <g filter="url(#shadow)">
    <rect x="40" y="86" width="920" height="96" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="60" y="110" font-size="13" font-weight="700" fill="#2563eb">LAYER 4 — Consumers</text>
    <text x="60" y="112" font-size="12" fill="#1e3a8a"></text>
    <text x="320" y="110" font-size="11.5" fill="#64748b">non-admin · medium integrity</text>
    <text x="60" y="134" font-size="12" fill="#334155">• any tool speaking the client protocol</text>
    <text x="60" y="154" font-size="12" fill="#334155">• BrokerSensorBridge.exe --client  (reference CLI consumer)</text>
    <text x="60" y="174" font-size="12" fill="#334155">• Reference Console GUI  (.NET 10 / Avalonia)</text>
  </g>

  <!-- PRIVILEGE BOUNDARY -->
  <line x1="40" y1="212" x2="960" y2="212" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8 5"/>
  <rect x="372" y="198" width="256" height="28" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="500" y="217" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b45309" letter-spacing="1">PRIVILEGE BOUNDARY</text>
  <text x="60" y="208" font-size="10.5" fill="#92400e">named pipe · length-prefixed JSON · scoped + authenticated</text>
  <text x="660" y="208" font-size="10.5" fill="#92400e">sensors:read / smbus:read (SensorBroker) · rgb:write (BrokerControl)</text>
  <line x1="500" y1="226" x2="500" y2="248" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LAYER 3 -->
  <g filter="url(#shadow)">
    <rect x="40" y="252" width="920" height="104" rx="12" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
    <text x="60" y="276" font-size="13" font-weight="700" fill="#0d9488">LAYER 3 — Broker · BrokerSensorBridge</text>
    <text x="430" y="276" font-size="11.5" fill="#64748b">elevated / LocalSystem service · the ONLY holder of the driver handle</text>
    <text x="60" y="300" font-size="12" fill="#334155">• authenticates peers · enforces scopes · rate-limits · audits</text>
    <text x="60" y="320" font-size="12" fill="#334155">• named catalogs: SensorCatalog (reads) · RgbCatalog (writes)</text>
    <text x="60" y="340" font-size="12" fill="#334155">• user-mode decode (k10temp · nct6683/nct6775 · JC42) + data-driven board calibration (labels/scales, no addresses)</text>
  </g>
  <text x="514" y="374" font-size="11" fill="#475569">DeviceIoControl — bounded IOCTLs only (INFO / XFER / SMU / SUPERIO / WRITE)</text>
  <line x1="500" y1="356" x2="500" y2="392" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LAYER 2 -->
  <g filter="url(#shadow)">
    <rect x="40" y="396" width="920" height="96" rx="12" fill="#fff1f2" stroke="#fb7185" stroke-width="1.5"/>
    <text x="60" y="420" font-size="13" font-weight="700" fill="#be123c">LAYER 2 — Kernel driver · BrokerSmbus</text>
    <text x="440" y="420" font-size="11.5" fill="#64748b">non-PnP KMDF · device admits only SYSTEM + Admins</text>
    <text x="60" y="444" font-size="12" fill="#334155">• validates every IOCTL field · bakes hardware addresses in-kernel</text>
    <text x="60" y="464" font-size="12" fill="#334155">• SMBus XFER · SMU read · Super-I/O read · brick-guarded SMBus write</text>
    <text x="60" y="484" font-size="12" font-weight="600" fill="#9f1239">• NO physical-memory map · NO MSR · NO arbitrary port I/O</text>
  </g>
  <line x1="500" y1="492" x2="500" y2="524" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LAYER 1 -->
  <g filter="url(#shadow)">
    <rect x="40" y="528" width="920" height="100" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="60" y="552" font-size="13" font-weight="700" fill="#334155">LAYER 1 — Hardware</text>
    <text x="60" y="576" font-size="12" fill="#334155">• AMD SMU (SMN via PCI cfg) — CPU temperature (Tctl + per-CCD) + core/SoC voltage (SVI2, Matisse/Vermeer)</text>
    <text x="60" y="596" font-size="12" fill="#334155">• Nuvoton Super-I/O (LPC/EC) — board temps + fans + voltages  (NCT668x EC family · NCT6775 bank-select family)</text>
    <text x="60" y="616" font-size="12" fill="#334155">• SMBus host controller (AMD FCH / Intel i801) — RAM / board RGB + SPD</text>
  </g>
</svg>
