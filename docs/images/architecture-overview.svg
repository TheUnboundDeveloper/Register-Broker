<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1024" viewBox="0 0 1080 1024" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <!-- drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0b1220" flood-opacity="0.25"/>
    </filter>
    <!-- arrowheads -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowTrust" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1080" height="1024" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="540" y="44" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">Register Broker — Architecture Overview</text>
  <text x="540" y="70" text-anchor="middle" font-size="14.5" fill="#475569">Secure, audited, non-admin low-level hardware access — sensors &amp; RGB, without per-app elevation</text>

  <!-- ============ LAYER 1: CLIENTS (non-admin / user mode) ============ -->
  <rect x="40" y="96" width="1000" height="132" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="122" font-size="13" font-weight="700" fill="#2563eb" letter-spacing="1">CLIENT APPLICATIONS · NON-ADMIN (USER MODE)</text>

  <g filter="url(#shadow)">
    <rect x="64" y="138" width="290" height="72" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="209" y="166" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">Reference Console</text>
    <text x="209" y="188" text-anchor="middle" font-size="11.5" fill="#475569">Avalonia dashboard · live sensors + RGB fleet</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="395" y="138" width="290" height="72" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="540" y="166" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">RgbAudioReactive</text>
    <text x="540" y="188" text-anchor="middle" font-size="11.5" fill="#475569">Standalone music-sync RGB consumer</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="726" y="138" width="290" height="72" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="871" y="166" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">Third-party apps</text>
    <text x="871" y="188" text-anchor="middle" font-size="11.5" fill="#475569">Name logical ids — never addresses</text>
  </g>

  <!-- arrows clients -> pipes -->
  <line x1="209" y1="210" x2="209" y2="258" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="210" x2="540" y2="258" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="871" y1="210" x2="871" y2="258" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ LAYER 2: IPC / AUTH boundary ============ -->
  <rect x="40" y="262" width="1000" height="80" rx="14" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="60" y="288" font-size="13" font-weight="700" fill="#b45309" letter-spacing="1">AUTHENTICATED IPC BOUNDARY · named pipes (protocol v2)</text>
  <g filter="url(#shadow)">
    <rect x="120" y="298" width="360" height="34" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.3"/>
    <text x="300" y="320" text-anchor="middle" font-size="12.5" font-weight="600" fill="#78350f">\\.\pipe\SensorBroker  ·  \\.\pipe\BrokerControl</text>
  </g>
  <text x="560" y="320" font-size="12" fill="#92400e">Pipe DACL · peer-process identity · Authenticode signer-thumbprint pin · rate-limit · audit.log</text>

  <line x1="540" y1="342" x2="540" y2="372" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ LAYER 3: BROKER (LocalSystem services) ============ -->
  <rect x="40" y="376" width="1000" height="216" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="402" font-size="13" font-weight="700" fill="#0d9488" letter-spacing="1">BROKER · BrokerSensorBridge (LocalSystem services, .NET 10)</text>

  <!-- control plane -->
  <g filter="url(#shadow)">
    <rect x="64" y="416" width="455" height="60" rx="10" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
    <text x="291" y="441" text-anchor="middle" font-size="14" font-weight="600" fill="#115e59">Control plane</text>
    <text x="291" y="462" text-anchor="middle" font-size="11.5" fill="#475569">auth · scopes · policy · sessions · audit</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="537" y="416" width="479" height="60" rx="10" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
    <text x="776" y="441" text-anchor="middle" font-size="14" font-weight="600" fill="#115e59">Catalog &amp; registries</text>
    <text x="776" y="462" text-anchor="middle" font-size="11.5" fill="#475569">sensor catalog + calibration · channel/decoder · RGB registry</text>
  </g>

  <!-- backends row -->
  <g filter="url(#shadow)">
    <rect x="64" y="490" width="305" height="88" rx="10" fill="#ecfeff" stroke="#67e8f9" stroke-width="1.5"/>
    <text x="216" y="514" text-anchor="middle" font-size="13" font-weight="600" fill="#155e75">Driver-backed backends</text>
    <text x="216" y="535" text-anchor="middle" font-size="11" fill="#475569">SMBus (AMD FCH / Intel i801)</text>
    <text x="216" y="552" text-anchor="middle" font-size="11" fill="#475569">AMD SMU · Super-I/O NCT668x / NCT6775</text>
    <text x="216" y="569" text-anchor="middle" font-size="11" fill="#475569">ENE DRAM RGB · MSI ARGB header</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="383" y="490" width="305" height="88" rx="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
    <text x="535" y="514" text-anchor="middle" font-size="13" font-weight="600" fill="#6b21a8">User-mode vendor backends</text>
    <text x="535" y="535" text-anchor="middle" font-size="11" fill="#475569">GPU: AMD ADL · NVIDIA NVML · Intel L0</text>
    <text x="535" y="552" text-anchor="middle" font-size="11" fill="#475569">Aquacomputer HID sensors (removable)</text>
    <text x="535" y="569" text-anchor="middle" font-size="11" fill="#6b21a8">reduced-assurance · opt-in</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="702" y="490" width="314" height="88" rx="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
    <text x="859" y="514" text-anchor="middle" font-size="13" font-weight="600" fill="#6b21a8">USB-HID RGB backends</text>
    <text x="859" y="535" text-anchor="middle" font-size="11" fill="#475569">MSI Mystic Light (static + per-LED)</text>
    <text x="859" y="552" text-anchor="middle" font-size="11" fill="#475569">Razer Chroma keyboards / mice</text>
    <text x="859" y="569" text-anchor="middle" font-size="11" fill="#6b21a8">user-mode · opt-in AllowHidRgb</text>
  </g>

  <!-- arrow broker(driver backends) -> kernel -->
  <line x1="216" y1="578" x2="216" y2="632" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="232" y="610" font-size="11" fill="#475569">bounded IOCTLs</text>

  <!-- arrows user-mode backends -> hardware (bypass kernel, trust boundary) -->
  <path d="M535,578 L535,704 L830,704 L830,762" fill="none" stroke="#b45309" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowTrust)"/>
  <path d="M920,578 L920,762" fill="none" stroke="#b45309" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowTrust)"/>
  <text x="612" y="696" font-size="11" fill="#b45309">user-mode · no kernel guard</text>

  <!-- ============ LAYER 4: KERNEL DRIVER ============ -->
  <rect x="40" y="636" width="372" height="118" rx="14" fill="#fff1f2" stroke="#fda4af" stroke-width="1.5"/>
  <text x="60" y="662" font-size="13" font-weight="700" fill="#be123c" letter-spacing="1">KERNEL DRIVER · BrokerSmbus (signed KMDF)</text>
  <g filter="url(#shadow)">
    <rect x="64" y="676" width="324" height="62" rx="10" fill="#ffe4e6" stroke="#fb7185" stroke-width="1.5"/>
    <text x="226" y="700" text-anchor="middle" font-size="12.5" font-weight="600" fill="#9f1239">In-kernel brick-guard + register allow-list</text>
    <text x="226" y="721" text-anchor="middle" font-size="11" fill="#475569">named registers only · no MSR / phys-mem / arbitrary I/O</text>
  </g>

  <line x1="226" y1="738" x2="226" y2="762" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ LAYER 5: HARDWARE ============ -->
  <rect x="40" y="766" width="1000" height="134" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="792" font-size="13" font-weight="700" fill="#334155" letter-spacing="1">PHYSICAL HARDWARE</text>

  <g filter="url(#shadow)">
    <rect x="64" y="804" width="220" height="80" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.3"/>
    <text x="174" y="832" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">SMBus / I2C bus</text>
    <text x="174" y="854" text-anchor="middle" font-size="11" fill="#475569">DRAM RGB · JC42 DIMM temps</text>
    <text x="174" y="870" text-anchor="middle" font-size="11" fill="#475569">MSI ARGB header</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="300" y="804" width="220" height="80" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.3"/>
    <text x="410" y="832" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Super-I/O EC</text>
    <text x="410" y="854" text-anchor="middle" font-size="11" fill="#475569">NCT668x / NCT6775</text>
    <text x="410" y="870" text-anchor="middle" font-size="11" fill="#475569">fan RPM · PWM · temps</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="536" y="804" width="220" height="80" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.3"/>
    <text x="646" y="832" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">CPU SMU</text>
    <text x="646" y="854" text-anchor="middle" font-size="11" fill="#475569">Tctl / per-CCD temps</text>
    <text x="646" y="870" text-anchor="middle" font-size="11" fill="#475569">SVI2 core / SoC voltage</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="772" y="804" width="244" height="80" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.3"/>
    <text x="894" y="832" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">GPU · USB-HID devices</text>
    <text x="894" y="854" text-anchor="middle" font-size="11" fill="#475569">discrete GPU · Aquacomputer</text>
    <text x="894" y="870" text-anchor="middle" font-size="11" fill="#475569">MSI / Razer RGB peripherals</text>
  </g>

  <!-- Legend (full-width strip, clear of the flow arrows) -->
  <g>
    <rect x="40" y="912" width="1000" height="78" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
    <text x="60" y="936" font-size="12.5" font-weight="700" fill="#334155" letter-spacing="1">LEGEND</text>

    <line x1="160" y1="932" x2="196" y2="932" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="206" y="936" font-size="11.5" fill="#475569">Kernel-mediated path — full brick-guard assurance</text>

    <line x1="560" y1="932" x2="596" y2="932" stroke="#b45309" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowTrust)"/>
    <text x="606" y="936" font-size="11.5" fill="#475569">User-mode vendor path — reduced assurance, opt-in</text>

    <rect x="160" y="962" width="16" height="12" rx="3" fill="#ffe4e6" stroke="#fb7185"/>
    <text x="184" y="972" font-size="11.5" fill="#475569">Kernel mode</text>
    <rect x="300" y="962" width="16" height="12" rx="3" fill="#f0fdfa" stroke="#5eead4"/>
    <text x="324" y="972" font-size="11.5" fill="#475569">Broker (LocalSystem)</text>
    <rect x="492" y="962" width="16" height="12" rx="3" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="516" y="972" font-size="11.5" fill="#475569">Non-admin client</text>
    <rect x="648" y="962" width="16" height="12" rx="3" fill="#f5f3ff" stroke="#a78bfa"/>
    <text x="672" y="972" font-size="11.5" fill="#475569">User-mode vendor / GPU · USB-HID</text>
  </g>

  <text x="540" y="1012" text-anchor="middle" font-size="11" fill="#94a3b8">Clients name logical ids (smu.cpu.temp, ram0) and cannot scan or write outside the baked, kernel-enforced map.</text>
</svg>
