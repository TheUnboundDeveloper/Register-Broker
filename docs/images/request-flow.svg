<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0b1220" flood-opacity="0.25"/>
    </filter>
    <marker id="aR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="aRet" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0d9488"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="540" fill="url(#bgGrad)"/>
  <text x="500" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#0f172a">Request Flow — <tspan font-family="Consolas, monospace" font-size="19">sensor.read cpu.temp</tspan></text>

  <!-- lifeline headers -->
  <g filter="url(#shadow)">
    <rect x="60" y="60" width="150" height="40" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="135" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">client</text>
    <rect x="330" y="60" width="150" height="40" rx="9" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
    <text x="405" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#115e59">broker</text>
    <rect x="600" y="60" width="150" height="40" rx="9" fill="#fff1f2" stroke="#fb7185" stroke-width="1.5"/>
    <text x="675" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#9f1239">driver</text>
    <rect x="840" y="60" width="130" height="40" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="905" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">hardware</text>
  </g>

  <!-- lifelines -->
  <g stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="135" y1="100" x2="135" y2="510"/>
    <line x1="405" y1="100" x2="405" y2="510"/>
    <line x1="675" y1="100" x2="675" y2="510"/>
    <line x1="905" y1="100" x2="905" y2="510"/>
  </g>

  <!-- messages -->
  <!-- 1 client->broker hello -->
  <text x="140" y="130" font-size="11.5" fill="#334155">hello(sensors:read)</text>
  <line x1="135" y1="138" x2="403" y2="138" stroke="#475569" stroke-width="1.8" marker-end="url(#aR)"/>

  <!-- broker self: auth -->
  <rect x="330" y="150" width="240" height="24" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="340" y="166" font-size="11" fill="#065f46">auth(peer id / signer) · DACL already passed</text>

  <!-- 2 broker->client ok -->
  <text x="200" y="196" font-size="11.5" fill="#0d9488">ok(token)</text>
  <line x1="405" y1="204" x2="137" y2="204" stroke="#0d9488" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#aRet)"/>

  <!-- 3 client->broker read -->
  <text x="140" y="232" font-size="11.5" fill="#334155">read(token, cpu.temp)</text>
  <line x1="135" y1="240" x2="403" y2="240" stroke="#475569" stroke-width="1.8" marker-end="url(#aR)"/>

  <!-- broker self: gate + catalog -->
  <rect x="330" y="252" width="290" height="42" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="340" y="268" font-size="11" fill="#065f46">token? scope? rate-limit?</text>
  <text x="340" y="286" font-size="11" fill="#065f46">catalog: cpu.temp → SMU_READ</text>

  <!-- 4 broker->driver IOCTL -->
  <text x="412" y="320" font-size="11.5" fill="#334155">IOCTL_SMU_READ</text>
  <line x1="405" y1="328" x2="673" y2="328" stroke="#475569" stroke-width="1.8" marker-end="url(#aR)"/>
  <rect x="600" y="338" width="150" height="22" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="610" y="353" font-size="11" fill="#991b1b">bake SMN addr</text>

  <!-- 5 driver->hardware -->
  <text x="682" y="384" font-size="11.5" fill="#334155">PCI cfg 0x60/64</text>
  <line x1="675" y1="392" x2="903" y2="392" stroke="#475569" stroke-width="1.8" marker-end="url(#aR)"/>

  <!-- 6 hardware->driver raw -->
  <text x="700" y="420" font-size="11.5" fill="#0d9488">raw 0x69BB0000</text>
  <line x1="905" y1="428" x2="677" y2="428" stroke="#0d9488" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#aRet)"/>

  <!-- 7 driver->broker raw32 -->
  <text x="450" y="456" font-size="11.5" fill="#0d9488">raw 32-bit</text>
  <line x1="675" y1="464" x2="407" y2="464" stroke="#0d9488" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#aRet)"/>

  <!-- broker self: decode -->
  <rect x="330" y="474" width="300" height="22" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="340" y="489" font-size="11" fill="#065f46">k10temp decode → 56.6 °C · audit(op → result)</text>

  <!-- 8 broker->client data -->
  <text x="170" y="520" font-size="11.5" fill="#0d9488">data(56.6, °C)</text>
  <line x1="405" y1="527" x2="137" y2="527" stroke="#0d9488" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#aRet)"/>
</svg>
