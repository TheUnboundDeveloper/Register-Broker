<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="372" viewBox="0 0 1000 372" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0b1220" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="372" fill="url(#bgGrad)"/>
  <text x="500" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">The Trust Boundary</text>

  <!-- left/right tint -->
  <rect x="24" y="64" width="452" height="284" rx="12" fill="#eff6ff" fill-opacity="0.5" stroke="#bfdbfe" stroke-width="1.2"/>
  <rect x="524" y="64" width="452" height="284" rx="12" fill="#f0fdfa" fill-opacity="0.6" stroke="#99f6e4" stroke-width="1.2"/>

  <text x="250" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">NON-ADMIN · MEDIUM INTEGRITY</text>
  <text x="750" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#0d9488">ELEVATED · LOCALSYSTEM</text>
  <text x="250" y="112" text-anchor="middle" font-size="11.5" fill="#64748b">untrusted</text>
  <text x="750" y="112" text-anchor="middle" font-size="11.5" fill="#64748b">trusted, audited</text>

  <!-- consumers -->
  <g filter="url(#shadow)">
    <rect x="70" y="150" width="200" height="70" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="170" y="182" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">Consumers</text>
    <text x="170" y="202" text-anchor="middle" font-size="11" fill="#475569">your app / CLI</text>
  </g>
  <text x="170" y="246" text-anchor="middle" font-size="11" fill="#475569">connect to a named pipe</text>

  <!-- boundary -->
  <line x1="500" y1="70" x2="500" y2="342" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="9 5"/>
  <rect x="452" y="118" width="96" height="26" rx="13" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="500" y="136" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">PIPE</text>

  <!-- arrow consumers -> boundary -->
  <line x1="270" y1="185" x2="494" y2="185" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- broker -->
  <g filter="url(#shadow)">
    <rect x="540" y="150" width="190" height="70" rx="10" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
    <text x="635" y="182" text-anchor="middle" font-size="14" font-weight="600" fill="#115e59">Broker</text>
    <text x="635" y="202" text-anchor="middle" font-size="11" fill="#475569">scope · rate-limit · audit</text>
  </g>
  <!-- kernel -->
  <g filter="url(#shadow)">
    <rect x="788" y="150" width="170" height="70" rx="10" fill="#fff1f2" stroke="#fb7185" stroke-width="1.5"/>
    <text x="873" y="182" text-anchor="middle" font-size="14" font-weight="600" fill="#9f1239">Kernel driver</text>
    <text x="873" y="202" text-anchor="middle" font-size="11" fill="#475569">named-register IOCTLs</text>
  </g>
  <line x1="730" y1="185" x2="784" y2="185" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="757" y="176" text-anchor="middle" font-size="10.5" fill="#475569">IOCTL</text>

  <!-- gate steps -->
  <text x="635" y="262" text-anchor="middle" font-size="11.5" fill="#334155">pipe DACL + peer identity + signer pin</text>
  <text x="635" y="282" text-anchor="middle" font-size="11.5" fill="#334155">scope check → op → rate-limit → audit</text>

  <text x="500" y="332" text-anchor="middle" font-size="11" fill="#94a3b8">A consumer can name only what the catalogs expose — never an address, bus, or index.</text>
</svg>
